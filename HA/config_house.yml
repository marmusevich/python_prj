 ##########################################################################################################

    # === 🌡️ Датчики температуры NT18B07 (7 каналов) ===
    # Регистры 0x0000–0x0006 → адреса 0–6, значение ×10 → делим на 10 (scale: 0.1)
    sensors:
      - name: "Мастер санузел - тёплый пол "
        slave: 100 # ← Адрес
        address: 0 # Регистр 0x0000
        input_type: holding
        data_type: int16
        scale: 0.1 # Преобразование: 225 → 22.5 °C
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_18_0"

      - name: "Гостевой санузел - тёплый пол "
        slave: 100
        address: 1
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_18_1"

      - name: "Постирочная - тёплый пол"
        slave: 100
        address: 2
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_18_2"

      - name: "Кухня - тёплый пол "
        slave: 100
        address: 3
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_18_3"

      - name: "Столовая - тёплый пол "
        slave: 100
        address: 4
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_18_4"

      - name: "NT18B07 Температура канал 6"
        slave: 100
        address: 5
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_1_5_temp_ch6"

      - name: "NT18B07 Температура канал 7"
        slave: 100
        address: 6
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_1_6_temp_ch7"

      - name: "NT18B07 Slave ID"
        slave: 100
        address: 254
        input_type: holding
        data_type: uint16
        unique_id: "nt18b07_hub_1_slave_id"

      - name: "NT18B07 Baudrate"
        slave: 100
        address: 255
        input_type: holding
        data_type: uint16
        unique_id: "nt18b07_hub_1_Baudrate"

