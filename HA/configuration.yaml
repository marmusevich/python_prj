    ##########################################################################################################

    # === 🌡️ Датчики температуры NT18B07 (7 каналов) ===
    # Регистры 0x0000–0x0006 → адреса 0–6, значение ×10 → делим на 10 (scale: 0.1)
    sensors:
      - name: "NT18B07 Температура канал 1"
        slave: 100 # ← Адрес
        address: 0 # Регистр 0x0000
        input_type: holding
        data_type: int16
        scale: 0.1 # Преобразование: 225 → 22.5 °C
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_1_0_temp_ch1"

      - name: "NT18B07 Температура канал 2"
        slave: 100
        address: 1
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_1_1_temp_ch2"

      - name: "NT18B07 Температура канал 3"
