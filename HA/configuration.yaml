        verify:
          input_type: coil

      - name: "CS8 Реле 14-0"
        slave: 14
        address: 0
        unique_id: "cs8_14_0_rele"
        write_type: coil
        verify:
          input_type: coil

      - name: "CS8 Реле 15-0"
        slave: 15
