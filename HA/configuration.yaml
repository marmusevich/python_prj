        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_1_5_temp_ch6"

      - name: "NT18B07 Температура канал 7"
        slave: 100
        address: 6
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_1_6_temp_ch7"

      - name: "NT18B07 Slave ID"
        slave: 100
        address: 254
        input_type: holding
        data_type: uint16
        unique_id: "nt18b07_hub_1_slave_id"

      - name: "NT18B07 Baudrate"
        slave: 100
        address: 255
        input_type: holding
        data_type: uint16
        unique_id: "nt18b07_hub_1_Baudrate"

