      - name: "NT18B07 Температура канал 5"
        slave: 100
        address: 4
        input_type: holding
        data_type: int16
        scale: 0.1
        precision: 1
        unit_of_measurement: "°C"
        device_class: temperature
        state_class: measurement
        unique_id: "nt18b07_hub_1_4_temp_ch5"

      - name: "NT18B07 Температура канал 6"
        slave: 100
        address: 5
