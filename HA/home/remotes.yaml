          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == '1_double' }}"
            sequence:
              - if:
                  - condition: or
                    conditions:
                      - condition: state
                        entity_id: automation.spalnia_spalnia_otkryt_shtoru_pri_otkrytii_dveri
                        state:
                          - "off"
                      - condition: and
                        conditions:
