# отловить событие - вызвать связаный мапинг
#
#

automation:
  - id: 1000-pult_01-button_1
    alias: _old_Пульт штор мастер санузел (1), кнопка 1
    triggers:
      - trigger: mqtt
        topic: zigbee2mqtt/Пульт штор мастер санузел (1)/action
    conditions: []
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == '1_single' }}"
            sequence:
              - action: cover.open_cover
                target:
                  entity_id: cover.master_sanuzel_shtora
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == '1_double' }}"
            sequence:
              - action: cover.close_cover
                target:
                  entity_id: cover.master_sanuzel_shtora
    mode: single
