                            state:
                              - "on"
                          - condition: state
                            entity_id: binary_sensor.datchik_dveri_spalnia_1_contact
                            state: "off"
                then:
                  - action: cover.close_cover
                    target:
                      entity_id:
                        - cover.0xa4c1384b515e4426
                else:
                  - data:
                      title: Жалюзи
                      message: "Спальня: Закрытие запрещено — дверь открыта."
                    action: persistent_notification.create
