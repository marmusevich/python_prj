# /config/packages/curtains/floor_heating_protection.yaml

# ============================================
# ЗАЩИТА ТЕПЛЫХ ПОЛОВ ОТ ПЕРЕГРЕВА
# ============================================

# 1. КОНСТАНТЫ И НАСТРОЙКИ
input_number:
  floor_overheat_threshold:
    name: "Порог ОТКЛЮЧЕНИЯ при перегреве (°C)"
    initial: 33
    min: 30
    max: 38
    step: 1
    mode: box

  floor_safe_temp:
    name: "Порог ВКЛЮЧЕНИЯ после остывания (°C)"
    initial: 28
    min: 20
    max: 29
    step: 1
    mode: box

# 2. ФЛАГИ ЗАЩИТЫ
input_boolean:
  protection_active_master_sanuzel:
    name: "🛡️ Защита активна - Мастер санузел"
    initial: false
    icon: mdi:shield-alert

  protection_active_gostevoi_sanuzel:
    name: "🛡️ Защита активна - Гостевой санузел"
    initial: false
    icon: mdi:shield-alert

  protection_active_postirochnaia:
    name: "🛡️ Защита активна - Постирочная"
    initial: false
    icon: mdi:shield-alert

  protection_active_kukhnia:
    name: "🛡️ Защита активна - Кухня"
    initial: false
    icon: mdi:shield-alert

  protection_active_stolovaia:
    name: "🛡️ Защита активна - Столовая"
    initial: false
    icon: mdi:shield-alert

# 3. АВТОМАТИЗАЦИИ
automation:
  # ========== МАСТЕР САНУЗЕЛ ==========
  - alias: "Защита от перегрева - Мастер санузел"
    id: "floor_overheat_protection_master_sanuzel"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.termopara_100_1
        above: input_number.floor_overheat_threshold
    action:
      # Устанавливаем флаг защиты
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.protection_active_master_sanuzel
      # Отключаем реле
      - action: switch.turn_off
        target:
          entity_id: switch.rele_18_1
      # Отключаем термостат
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.master_sanuzel_termostat
        data:
          hvac_mode: "off"
      # Логирование WARNING
      - action: system_log.write
        data:
          message: >
            "🔥 ЗАЩИТА СРАБОТАЛА: Мастер санузел - перегрев {{ states('sensor.termopara_100_1') }}°C
            (порог {{ states('input_number.floor_overheat_threshold') }}°C). Реле и термостат отключены."
          level: warning
          logger: "automation.floor_heating_protection.master_sanuzel"
      # Уведомление в GUI
      - action: persistent_notification.create
        data:
          title: " Перегрев теплого пола"
          message: |
            **Мастер санузел**

            Температура: {{ states('sensor.termopara_100_1') }}°C
            Порог: {{ states('input_number.floor_overheat_threshold') }}°C

            ✅ Реле и термостат отключены
          notification_id: "floor_overheat_master_sanuzel"

  - alias: "Жесткая защита - Мастер санузел"
    id: "floor_hard_protection_master_sanuzel"
    mode: single
    trigger:
      - platform: state
        entity_id: climate.master_sanuzel_termostat
        to: "heat"
    condition:
      - condition: numeric_state
        entity_id: sensor.termopara_100_1
        above: input_number.floor_overheat_threshold
    action:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.protection_active_master_sanuzel
      - action: switch.turn_off
        target:
          entity_id: switch.rele_18_1
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.master_sanuzel_termostat
        data:
          hvac_mode: "off"
      - action: system_log.write
        data:
          message: >
            "🔥 ЖЕСТКАЯ ЗАЩИТА: Мастер санузел - пользователь попытался включить при {{ states('sensor.termopara_100_1') }}°C.
            Принудительно отключено."
          level: warning
          logger: "automation.floor_heating_protection.master_sanuzel"
      - action: persistent_notification.create
        data:
          title: "🔥 Перегрев теплого пола"
          message: |
            **Мастер санузел**

            Температура: {{ states('sensor.termopara_100_1') }}°C
            Порог: {{ states('input_number.floor_overheat_threshold') }}°C

            ⛔ Включение заблокировано защитой
          notification_id: "floor_overheat_master_sanuzel"

  - alias: "Включение после перегрева - Мастер санузел"
    id: "floor_recovery_master_sanuzel"
    mode: single
    trigger:
      - platform: numeric_state
        entity_id: sensor.termopara_100_1
        below: input_number.floor_safe_temp
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.protection_active_master_sanuzel
        state: "on"
      - condition: state
        entity_id: climate.master_sanuzel_termostat
        state: "off"
    action:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.master_sanuzel_termostat
        data:
          hvac_mode: "heat"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.protection_active_master_sanuzel
      - action: system_log.write
        data:
          message: "✅ Восстановление: Мастер санузел - температура упала до {{ states('sensor.termopara_100_1') }}°C. Термостат включен."
          level: info
          logger: "automation.floor_heating_protection.master_sanuzel"
      - action: persistent_notification.create
        data:
          title: "✅ Восстановление работы"
          message: |
            **Мастер санузел**

            Температура: {{ states('sensor.termopara_100_1') }}°C
            Порог включения: {{ states('input_number.floor_safe_temp') }}°C

            ✅ Термостат включен
          notification_id: "floor_recovery_master_sanuzel"

