        entity_id: input_boolean.protection_active_stolovaia
        state: "on"
      - condition: state
        entity_id: climate.stolovaia_termostat
        state: "off"
    action:
      - action: climate.set_hvac_mode
        target:
          entity_id: climate.stolovaia_termostat
        data:
          hvac_mode: "heat"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.protection_active_stolovaia
      - action: system_log.write
        data:
          message: "✅ Восстановление: Столовая - температура {{ states('sensor.termopara_100_5') }}°C. Термостат включен."
          level: info
          logger: "automation.floor_heating_protection.stolovaia"
      - action: persistent_notification.create
        data:
          title: "✅ Восстановление работы"
          message: |
            **Столовая**

            Температура: {{ states('sensor.termopara_100_5') }}°C
            Порог включения: {{ states('input_number.floor_safe_temp') }}°C

            ✅ Термостат включен
          notification_id: "floor_recovery_stolovaia"

