# отловить событие - вызвать связаный мапинг
#
#

automation:

# /config/packages/curtains/automations/remotes.yaml

  # ============================================================================
  # ПУЛЬТ 9: Пульт штор кухня (вход)
  # ============================================================================

  - id: 2000-pult_09-button_1
    alias: "Пульт штор кухня (9), кнопка 1"
    triggers:
      - trigger: mqtt
        topic: zigbee2mqtt/Пульт штор кухня (9)/action
    conditions: []
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == '1_single' }}"
            sequence:
              - service: script.kitchen_curtain_cycle
          - conditions:
              - condition: template
                value_template: "{{ trigger.payload == '1_double' }}"
            sequence:
