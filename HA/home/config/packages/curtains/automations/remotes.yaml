  # ============================================================================

  - id: 2000-pult_09-button_1
    alias: "Пульт штор кухня (9), кнопка 1"
    triggers:
      - trigger: mqtt
        topic: zigbee2mqtt/Пульт штор кухня (9)/action
    conditions: []
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger is defined and trigger.payload == '1_single' }}"
