# /config/packages/curtains/automations/sync_motion_flags.yaml

# ============================================================================
# СИНХРОНИЗАЦИЯ ФЛАГОВ ДВИЖЕНИЯ
# Когда физическое устройство сообщает "остановилось" (running: false),
# сбрасываем логический флаг input_boolean в off.
# ============================================================================
automation:
  # 1. Мастер санузел жалюзи
  - id: 3000-sync_motion_master_bath_blind
    alias: "Sync: Мастер санузел жалюзи - сброс флага движения"
    triggers:
      - trigger: state
        entity_id: binary_sensor.master_sanuzel_zhaliuzi_dvizhenie
        to: "off"
    conditions: []
    actions:
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.master_bath_blind_is_moving
    mode: single

  # 2. Кухня тюль
