# защита штор, объеденить защищаемые шторы в группы
#

automation:
  - id: 2000-cover_cabinet_when_door_open
    alias: "Защита: Кабинет - остановить штору при открытии двери"
    triggers:
      - entity_id: binary_sensor.datchik_dveri_kabinet_3_contact
        from: "off"
        to: "on"
        trigger: state
    conditions: []
    actions:
      - target:
          entity_id:
            - cover.kabinet_s_zashchioi_ot_otkrytiia_dveri
        action: cover.stop_cover
        data: {}
      # 2. Логирование в системный журнал HA
      - action: system_log.write
        data:
          message: "Защита сработала: дверь Кабинета открыта, шторы остановлены"
          level: warning
      # 3. Уведомление в UI (persistent notification)
      - action: persistent_notification.create
        data:
          title: "Защита штор"
          message: "Дверь Кабинета открыта - шторы остановлены"
          notification_id: "curtain_protection_cabinet"
    mode: single

