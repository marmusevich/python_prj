  # ============================================================================
  # ГОСТИНАЯ: Защита шторы и тюля от вентиляции
  # Если штора/тюль начала двигаться (motion_sensor = on) и вентиляция открыта
  # (protection_sensor = on) - останавливаем устройство
  # ============================================================================

  - id: 2000-cover_gostinaya_curtain_when_vent_open
    alias: "Защита: Гостиная штора - остановить при открытой вентиляции"
    triggers:
      - trigger: state
        entity_id: binary_sensor.gostinaia_shtora_dvizhenie
        to: "on"
    conditions:
      - condition: state
        entity_id: binary_sensor.gostinaia_ventiliatsiia_otkryta
        state: "on"
    actions:
      - service: cover.stop_cover
        target:
          entity_id: cover.gostinaia_shtora
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.gostinaya_shtora_is_moving
      - service: system_log.write
        data:
          message: "Защита сработала: вентиляция в гостиной открыта, штора остановлена"
          level: warning
          logger: "automation.curtain_protection.2000-cover_gostinaya_curtain_when_vent_open"
      # Уведомление в UI (для тестирования)
      - service: persistent_notification.create
        data:
          title: "Защита штор"
          message: "Гостиная: вентиляция открыта - штора остановлена"
          notification_id: "curtain_protection_gostinaya_curtain"
    mode: single

  - id: 2000-cover_gostinaya_tulle_when_vent_open
    alias: "Защита: Гостиная тюль - остановить при открытой вентиляции"
