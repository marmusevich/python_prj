# /config/packages/curtains/scripts/logic.yaml

script:
  # ============================================================================
  # 1. БАЗОВЫЕ СКРИПТЫ ДЛЯ ОДНОЙ ШТОРЫ
  # ============================================================================

  curtain_cycle:
    alias: "(не вызывать) Универсальный скрипт цикла для ОДНОЙ шторы"
    fields:
      target_cover: { description: "Entity ID шторы", required: true }
      motion_sensor: { description: "Binary sensor движения (MQTT)", required: true }
      motion_flag: { description: "Input boolean флага движения", required: true }
      last_dir_select: { description: "Input select для хранения направления", required: true }
    sequence:
      - variables:
          current_pos: "{{ state_attr(target_cover, 'current_position') | int(0) }}"
          is_moving: >-
            {% if motion_sensor is defined and motion_flag is defined %}
              {{ is_state(motion_sensor, 'on') or is_state(motion_flag, 'on') }}
            {% elif motion_sensor is defined %}
              {{ is_state(motion_sensor, 'on') }}
            {% elif motion_flag is defined %}
              {{ is_state(motion_flag, 'on') }}
            {% else %}
              false
            {% endif %}
          last_dir: "{{ states(last_dir_select) if last_dir_select is defined else 'unknown' }}"
          closed_threshold: "{{ states('input_number.curtain_closed_threshold') | int(5) }}"
          open_threshold: "{{ states('input_number.curtain_open_threshold') | int(95) }}"

      - service: system_log.write
        data:
          message: "DEBUG curtain_cycle: cover={{ target_cover }}, pos={{ current_pos }}, moving={{ is_moving }}, dir={{ last_dir }}"
          level: warning

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ current_pos <= closed_threshold }}"
            sequence:
              - service: cover.set_cover_position
                target: { entity_id: "{{ target_cover }}" }
                data: { position: 100 }
              - service: input_boolean.turn_on
                target: { entity_id: "{{ motion_flag }}" }
              - service: input_select.select_option
                target: { entity_id: "{{ last_dir_select }}" }
                data: { option: "opening" }

          - conditions:
              - condition: template
                value_template: "{{ current_pos >= open_threshold }}"
            sequence:
              - service: cover.set_cover_position
                target: { entity_id: "{{ target_cover }}" }
                data: { position: 0 }
              - service: input_boolean.turn_on
                target: { entity_id: "{{ motion_flag }}" }
              - service: input_select.select_option
                target: { entity_id: "{{ last_dir_select }}" }
                data: { option: "closing" }

          - conditions:
              - condition: template
                value_template: "{{ current_pos > closed_threshold and current_pos < open_threshold }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ is_moving }}"
                    sequence:
                      - service: cover.stop_cover
                        target: { entity_id: "{{ target_cover }}" }
                      - service: input_boolean.turn_off
                        target: { entity_id: "{{ motion_flag }}" }
                  - conditions:
                      - condition: template
                        value_template: "{{ not is_moving }}"
                    sequence:
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ last_dir in ['closing', 'unknown'] }}"
                            sequence:
                              - service: cover.set_cover_position
                                target: { entity_id: "{{ target_cover }}" }
                                data: { position: 100 }
                              - service: input_boolean.turn_on
                                target: { entity_id: "{{ motion_flag }}" }
                              - service: input_select.select_option
                                target: { entity_id: "{{ last_dir_select }}" }
                                data: { option: "opening" }
                          - conditions:
                              - condition: template
                                value_template: "{{ last_dir == 'opening' }}"
                            sequence:
                              - service: cover.set_cover_position
                                target: { entity_id: "{{ target_cover }}" }
                                data: { position: 0 }
                              - service: input_boolean.turn_on
                                target: { entity_id: "{{ motion_flag }}" }
                              - service: input_select.select_option
                                target: { entity_id: "{{ last_dir_select }}" }
                                data: { option: "closing" }

  curtain_cycle_protected:
    alias: "(не вызывать) Универсальный скрипт цикла с защитой"
    fields:
      target_cover: { description: "Entity ID шторы", required: true }
      motion_sensor: { description: "Binary sensor движения (MQTT)", required: true }
      motion_flag: { description: "Input boolean флага движения", required: true }
      last_dir_select: { description: "Input select для хранения направления", required: true }
      protection_sensor: { description: "Датчик открытия двери (защита)", required: false }
    sequence:
      - variables:
          is_protected: "{{ protection_sensor is defined and is_state(protection_sensor, 'on') }}"

      - service: system_log.write
        data:
          message: "DEBUG protected_cycle: cover={{ target_cover }}, protection={{ protection_sensor | default('none') }}, is_protected={{ is_protected }}"
          level: warning

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not is_protected }}"
            sequence:
              - service: script.curtain_cycle
                data:
                  target_cover: "{{ target_cover }}"
                  motion_sensor: "{{ motion_sensor }}"
                  motion_flag: "{{ motion_flag }}"
                  last_dir_select: "{{ last_dir_select }}"

  # ============================================================================
  # 2. СКРИПТЫ ДЛЯ СЦЕН И ГРУПП (с защитой и обновлением состояний)
  # ============================================================================

  curtain_set_positions:
    alias: "(не вызывать) Универсальный скрипт установки позиций с защитой"
    fields:
      curtains:
        description: "Список словарей: {cover, position, motion_flag, last_dir, protection}"
    sequence:
      - repeat:
          for_each: "{{ curtains }}"
          sequence:
            - variables:
                is_protected: >
                  {% if repeat.item.protection is defined and repeat.item.protection %}
                    {{ is_state(repeat.item.protection, 'on') }}
                  {% else %}
                    false
                  {% endif %}

            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ not is_protected }}"
                  sequence:
                    - service: cover.set_cover_position
                      target: { entity_id: "{{ repeat.item.cover }}" }
                      data: { position: "{{ repeat.item.position }}" }

                    # Обновляем last_dir на основе позиции
                    - service: input_select.select_option
                      target: { entity_id: "{{ repeat.item.last_dir }}" }
                      data:
                        option: >
                          {% if repeat.item.position >= 95 %}
                            opening
                          {% elif repeat.item.position <= 5 %}
                            closing
                          {% else %}
                            {{ states(repeat.item.last_dir) }}
                          {% endif %}

                    # Включаем флаг движения
                    - service: input_boolean.turn_on
                      target: { entity_id: "{{ repeat.item.motion_flag }}" }

  curtain_group_open_or_stop:
    alias: "(не вызывать) Группа: открыть всё или стоп"
    fields:
      covers: { description: "Список cover entity_id" }
      motion_flags: { description: "Список input_boolean флагов движения" }
      last_dirs: { description: "Список input_select для хранения направления" }
    sequence:
      - variables:
          any_moving: >
            {% set moving_count = namespace(value=0) %}
            {% for flag in motion_flags %}
              {% if is_state(flag, 'on') %}
                {% set moving_count.value = moving_count.value + 1 %}
              {% endif %}
            {% endfor %}
            {{ moving_count.value > 0 }}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ any_moving }}"
            sequence:
              - service: cover.stop_cover
                target: { entity_id: "{{ covers }}" }
              - service: input_boolean.turn_off
                target: { entity_id: "{{ motion_flags }}" }
              # last_dir не меняем при стопе

          - conditions:
              - condition: template
                value_template: "{{ not any_moving }}"
            sequence:
              - service: cover.set_cover_position
                target: { entity_id: "{{ covers }}" }
                data: { position: 100 }
              - service: input_boolean.turn_on
                target: { entity_id: "{{ motion_flags }}" }
              # Обновляем last_dir для всех устройств
              - repeat:
                  for_each: "{{ last_dirs }}"
                  sequence:
                    - service: input_select.select_option
                      target: { entity_id: "{{ repeat.item }}" }
                      data: { option: "opening" }

  curtain_group_close:
    alias: "(не вызывать) Группа: закрыть всё"
    fields:
      covers: { description: "Список cover entity_id" }
      motion_flags: { description: "Список input_boolean флагов движения" }
      last_dirs: { description: "Список input_select для хранения направления" }
    sequence:
      - service: cover.set_cover_position
        target: { entity_id: "{{ covers }}" }
        data: { position: 0 }
      - service: input_boolean.turn_on
        target: { entity_id: "{{ motion_flags }}" }
      # Обновляем last_dir для всех устройств
      - repeat:
          for_each: "{{ last_dirs }}"
          sequence:
            - service: input_select.select_option
              target: { entity_id: "{{ repeat.item }}" }
              data: { option: "closing" }