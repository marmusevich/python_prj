  spalnya_curtain_lp_cycle:
    alias: "Спальня шторы (L+P) - цикл"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.spalnia_shtora_ugol"
          motion_sensor: "binary_sensor.spalnia_shtora_ugol_dvizhenie"
          motion_flag: "input_boolean.spalnya_shtora_ugol_is_moving"
          last_dir_select: "input_select.spalnya_shtora_ugol_last_dir"
