            - { cover: "cover.master_sanuzel_tiul", position: 100, motion_flag: "input_boolean.master_bath_tulle_is_moving", last_dir: "input_select.master_bath_tulle_last_dir", protection: null }
            - { cover: "cover.master_sanuzel_zhaliuzi", position: 0, motion_flag: "input_boolean.master_bath_blind_is_moving", last_dir: "input_select.master_bath_blind_last_dir", protection: null }

  master_bath_all_open_or_stop:
    alias: "Мастер санузел всё - открыть или стоп"
    sequence:
      - service: script.curtain_group_open_or_stop
        data:
          covers: [ cover.master_sanuzel_shtora, cover.master_sanuzel_tiul, cover.master_sanuzel_zhaliuzi ]
          motion_flags: [ input_boolean.master_bath_curtain_is_moving, input_boolean.master_bath_tulle_is_moving, input_boolean.master_bath_blind_is_moving ]
          last_dirs: [ input_select.master_bath_curtain_last_dir, input_select.master_bath_tulle_last_dir, input_select.master_bath_blind_last_dir ]

  master_bath_all_close:
    alias: "Мастер санузел всё - закрыть"
