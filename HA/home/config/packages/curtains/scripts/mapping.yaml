# self path: /config/packages/curtains/scripts/mapping.yaml
# мапинг пульт / кнопка / действие - на
#   реальную штору / датчик / сцену
#   вызов универсального скрипта цикла
#################################################################################################

script:
# ============================================================================
# --- КУХНЯ
  kitchen_curtain_cycle:
    alias: "Кухня шторы - цикл"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.kukhnia_shtora"
          motion_sensor: "binary_sensor.kukhnia_shtora_dvizhenie"
          motion_flag: "input_boolean.kitchen_curtain_is_moving"
          last_dir_select: "input_select.kitchen_curtain_last_dir"
          # protection_sensor не передаем - на кухне нет датчика двери

  kitchen_tulle_cycle:
    alias: "Кухня тюль - цикл"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.kukhnia_tiul"
          motion_sensor: "binary_sensor.kukhnia_tiul_dvizhenie"
          motion_flag: "input_boolean.kitchen_tulle_is_moving"
          last_dir_select: "input_select.kitchen_tulle_last_dir"

  kitchen_blind_cycle:
    alias: "Кухня жалюзи - цикл"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.kukhnia_zhaliuzi"
          motion_sensor: "binary_sensor.kukhnia_zhaliuzi_dvizhenie"
          motion_flag: "input_boolean.kitchen_blind_is_moving"
          last_dir_select: "input_select.kitchen_blind_last_dir"

  # Сцены кухни
  kitchen_scene_1:
    alias: "Кухня сцена кнопки 1"
    sequence:
      - service: script.curtain_set_positions
        data:
          positions:
            cover.kukhnia_shtora: 100
            cover.kukhnia_tiul: 0
            cover.kukhnia_zhaliuzi: 0

  kitchen_scene_2:
    alias: "Кухня сцена кнопки 2"
    sequence:
      - service: script.curtain_set_positions
        data:
          positions:
            cover.kukhnia_shtora: 100
            cover.kukhnia_tiul: 0
            cover.kukhnia_zhaliuzi: 100

  kitchen_scene_3:
    alias: "Кухня сцена кнопки 3"
    sequence:
      - service: script.curtain_set_positions
        data:
          positions:
            cover.kukhnia_shtora: 100
            cover.kukhnia_tiul: 100
            cover.kukhnia_zhaliuzi: 0
  
  # КУХНЯ: Групповые действия (для кнопки 4)
  kitchen_all_open_or_stop:
    alias: "Кухня всё - открыть или стоп"
    sequence:
      - service: script.curtain_group_open_or_stop
        data:
          covers:
            - cover.kukhnia_shtora
            - cover.kukhnia_tiul
            - cover.kukhnia_zhaliuzi
          motion_flags:
            - input_boolean.kitchen_curtain_is_moving
            - input_boolean.kitchen_tulle_is_moving
            - input_boolean.kitchen_blind_is_moving

  kitchen_all_close:
    alias: "Кухня всё - закрыть"
    sequence:
      - service: script.curtain_group_close
        data:
          covers:
            - cover.kukhnia_shtora
            - cover.kukhnia_tiul
            - cover.kukhnia_zhaliuzi
          motion_flags:
            - input_boolean.kitchen_curtain_is_moving
            - input_boolean.kitchen_tulle_is_moving
            - input_boolean.kitchen_blind_is_moving            

  # ============================================================================
  # МАСТЕР САНУЗЕЛ: Циклы для отдельных устройств
  # ============================================================================
  
  master_bath_curtain_cycle:
    alias: "Мастер санузел штора - цикл"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.master_sanuzel_shtora"
          motion_sensor: "binary_sensor.master_sanuzel_shtora_dvizhenie"
          motion_flag: "input_boolean.master_bath_curtain_is_moving"
          last_dir_select: "input_select.master_bath_curtain_last_dir"

  master_bath_tulle_cycle:
    alias: "Мастер санузел тюль - цикл"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.master_sanuzel_tiul"
          motion_sensor: "binary_sensor.master_sanuzel_tiul_dvizhenie"
          motion_flag: "input_boolean.master_bath_tulle_is_moving"
          last_dir_select: "input_select.master_bath_tulle_last_dir"

  master_bath_blind_cycle:
    alias: "Мастер санузел жалюзи - цикл"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.master_sanuzel_zhaliuzi"
          motion_sensor: "binary_sensor.master_sanuzel_zhaliuzi_dvizhenie"
          motion_flag: "input_boolean.master_bath_blind_is_moving"
          last_dir_select: "input_select.master_bath_blind_last_dir"

  # ============================================================================
  # МАСТЕР САНУЗЕЛ: Сцены
  # ============================================================================
  
  master_bath_scene_1:
    alias: "Мастер санузел сцена 1"
    sequence:
      - service: script.curtain_set_positions
        data:
          positions:
            cover.master_sanuzel_shtora: 100
            cover.master_sanuzel_tiul: 0
            cover.master_sanuzel_zhaliuzi: 0

  master_bath_scene_2:
    alias: "Мастер санузел сцена 2"
    sequence:
      - service: script.curtain_set_positions
        data:
          positions:
            cover.master_sanuzel_shtora: 100
            cover.master_sanuzel_tiul: 0
            cover.master_sanuzel_zhaliuzi: 100

  master_bath_scene_3:
    alias: "Мастер санузел сцена 3"
    sequence:
      - service: script.curtain_set_positions
        data:
          positions:
            cover.master_sanuzel_shtora: 100
            cover.master_sanuzel_tiul: 100
            cover.master_sanuzel_zhaliuzi: 0

  # ============================================================================
  # МАСТЕР САНУЗЕЛ: Групповые действия (для кнопки 4)
  # ============================================================================
  
  master_bath_all_open_or_stop:
    alias: "Мастер санузел всё - открыть или стоп"
    sequence:
      - service: script.curtain_group_open_or_stop
        data:
          covers:
            - cover.master_sanuzel_shtora
            - cover.master_sanuzel_tiul
            - cover.master_sanuzel_zhaliuzi
          motion_flags:
            - input_boolean.master_bath_curtain_is_moving
            - input_boolean.master_bath_tulle_is_moving
            - input_boolean.master_bath_blind_is_moving

  master_bath_all_close:
    alias: "Мастер санузел всё - закрыть"
    sequence:
      - service: script.curtain_group_close
        data:
          covers:
            - cover.master_sanuzel_shtora
            - cover.master_sanuzel_tiul
            - cover.master_sanuzel_zhaliuzi
          motion_flags:
            - input_boolean.master_bath_curtain_is_moving
            - input_boolean.master_bath_tulle_is_moving
            - input_boolean.master_bath_blind_is_moving            


  # ============================================================================
  # СПАЛЬНЯ: Циклы для групп устройств (L+P)
  # ============================================================================
  
  spalnya_curtain_lp_cycle:
    alias: "Спальня шторы (L+P) - цикл"
    sequence:
      # Штора L
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.spalnia_shtora_ugol"
          motion_sensor: "binary_sensor.spalnia_shtora_ugol_dvizhenie"
          motion_flag: "input_boolean.spalnya_shtora_ugol_is_moving"
          last_dir_select: "input_select.spalnya_shtora_ugol_last_dir"
          protection_sensor: "binary_sensor.datchik_dveri_spalnia_1_contact"
      # Штора P
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.spalnia_balkon_shtora"
          motion_sensor: "binary_sensor.spalnia_balkon_shtora_dvizhenie"
          motion_flag: "input_boolean.spalnya_balkon_shtora_is_moving"
          last_dir_select: "input_select.spalnya_balkon_shtora_last_dir"
          protection_sensor: "binary_sensor.datchik_dveri_spalnia_1_contact"

  spalnya_tulle_lp_cycle:
    alias: "Спальня тюль (L+P) - цикл"
    sequence:
      # Тюль L
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.spalnia_tiul_ugol"
          motion_sensor: "binary_sensor.spalnia_tiul_ugol_dvizhenie"
          motion_flag: "input_boolean.spalnya_tiul_ugol_is_moving"
          last_dir_select: "input_select.spalnya_tiul_ugol_last_dir"
          protection_sensor: "binary_sensor.datchik_dveri_spalnia_1_contact"
      # Тюль P
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.spalnia_balkon_tiul"
          motion_sensor: "binary_sensor.spalnia_balkon_tiul_dvizhenie"
          motion_flag: "input_boolean.spalnya_balkon_tiul_is_moving"
          last_dir_select: "input_select.spalnya_balkon_tiul_last_dir"
          protection_sensor: "binary_sensor.datchik_dveri_spalnia_1_contact"

  spalnya_blinds_lp_cycle:
    alias: "Спальня роллеты (L+P) - цикл"
    sequence:
      # Роллета L
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.spalnia_zhaluzi_okno_levoe"
          motion_sensor: "binary_sensor.spalnia_zhaluzi_okno_levoe_dvizhenie"
          motion_flag: "input_boolean.spalnya_zhaluzi_okno_levoe_is_moving"
          last_dir_select: "input_select.spalnya_zhaluzi_okno_levoe_last_dir"
          protection_sensor: "binary_sensor.datchik_dveri_spalnia_1_contact"
      # Роллета P
      - service: script.curtain_cycle_protected
        data:
          target_cover: "cover.spalnia_zhaluzi_okno_pravoe"
          motion_sensor: "binary_sensor.spalnia_zhaluzi_okno_pravoe_dvizhenie"
          motion_flag: "input_boolean.spalnya_zhaluzi_okno_pravoe_is_moving"
          last_dir_select: "input_select.spalnya_zhaluzi_okno_pravoe_last_dir"
          protection_sensor: "binary_sensor.datchik_dveri_spalnia_1_contact"

  # ============================================================================
  # СПАЛЬНЯ: Сцены
  # ============================================================================
  
  spalnya_scene_1:
    alias: "Спальня сцена 1 (Шторы открыты, Тюль/Роллеты закрыты)"
    sequence:
      - service: script.curtain_set_positions
        data:
          positions:
            cover.spalnia_shtora_ugol: 100
            cover.spalnia_balkon_shtora: 100
            cover.spalnia_tiul_ugol: 0
            cover.spalnia_balkon_tiul: 0
            cover.spalnia_zhaluzi_okno_levoe: 0
            cover.spalnia_zhaluzi_okno_pravoe: 0

  spalnya_scene_2:
    alias: "Спальня сцена 2 (Шторы/Роллеты открыты, Тюль закрыт)"
    sequence:
      - service: script.curtain_set_positions
        data:
          positions:
            cover.spalnia_s
            

