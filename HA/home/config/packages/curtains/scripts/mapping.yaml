            - { cover: "cover.spalnia_tiul_ugol", position: 0, motion_flag: "input_boolean.spalnya_tiul_ugol_is_moving", last_dir: "input_select.spalnya_tiul_ugol_last_dir", protection: "binary_sensor.datchik_dveri_spalnia_1_contact" }
            - { cover: "cover.spalnia_balkon_tiul", position: 0, motion_flag: "input_boolean.spalnya_balkon_tiul_is_moving", last_dir: "input_select.spalnya_balkon_tiul_last_dir", protection: "binary_sensor.datchik_dveri_spalnia_1_contact" }
