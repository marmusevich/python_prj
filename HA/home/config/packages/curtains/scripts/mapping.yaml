# /config/packages/curtains/scripts/mapping.yaml

script:
  # ============================================================================
  # КУХНЯ
  # ============================================================================

  kitchen_curtain_cycle:
    alias: "штора - цикл: Кухня"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: cover.kukhnia_shtora
          motion_sensor: binary_sensor.kukhnia_shtora_dvizhenie
          motion_flag: input_boolean.kitchen_curtain_is_moving
          last_dir_select: input_select.kitchen_curtain_last_dir

  kitchen_tulle_cycle:
    alias: "тюль - цикл: Кухня"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: cover.kukhnia_tiul
          motion_sensor: binary_sensor.kukhnia_tiul_dvizhenie
          motion_flag: input_boolean.kitchen_tulle_is_moving
          last_dir_select: input_select.kitchen_tulle_last_dir

  kitchen_blind_cycle:
    alias: "жалюзи - цикл: Кухня"
    sequence:
      - service: script.curtain_cycle_protected
        data:
          target_cover: cover.kukhnia_zhaliuzi
          motion_sensor: binary_sensor.kukhnia_zhaliuzi_dvizhenie
          motion_flag: input_boolean.kitchen_blind_is_moving
          last_dir_select: input_select.kitchen_blind_last_dir

  kitchen_scene_1:
    alias: "сцена 1: Кухня"
    sequence:
      - service: script.curtain_set_positions
        data:
          curtains:
            - {
                cover: cover.kukhnia_shtora,
                position: 100,
                motion_flag: input_boolean.kitchen_curtain_is_moving,
                last_dir: input_select.kitchen_curtain_last_dir,
                protection: null,
              }
            - {
                cover: cover.kukhnia_tiul,
                position: 0,
                motion_flag: input_boolean.kitchen_tulle_is_moving,
                last_dir: input_select.kitchen_tulle_last_dir,
                protection: null,
              }
            - {
                cover: cover.kukhnia_zhaliuzi,
                position: 0,
                motion_flag: input_boolean.kitchen_blind_is_moving,
                last_dir: input_select.kitchen_blind_last_dir,
                protection: null,
              }

  kitchen_scene_2:
    alias: "сцена 2: Кухня"
    sequence:
      - service: script.curtain_set_positions
        data:
          curtains:
            - {
                cover: cover.kukhnia_shtora,
                position: 100,
                motion_flag: input_boolean.kitchen_curtain_is_moving,
                last_dir: input_select.kitchen_curtain_last_dir,
                protection: null,
              }
            - {
                cover: cover.kukhnia_tiul,
                position: 0,
                motion_flag: input_boolean.kitchen_tulle_is_moving,
                last_dir: input_select.kitchen_tulle_last_dir,
                protection: null,
              }
            - {
                cover: cover.kukhnia_zhaliuzi,
                position: 100,
                motion_flag: input_boolean.kitchen_blind_is_moving,
                last_dir: input_select.kitchen_blind_last_dir,
                protection: null,
              }

  kitchen_scene_3:
    alias: "сцена 3: Кухня"
    sequence:
      - service: script.curtain_set_positions
        data:
          curtains:
            - {
                cover: cover.kukhnia_shtora,
                position: 100,
                motion_flag: input_boolean.kitchen_curtain_is_moving,
                last_dir: input_select.kitchen_curtain_last_dir,
                protection: null,
              }
            - {
                cover: cover.kukhnia_tiul,
                position: 100,
                motion_flag: input_boolean.kitchen_tulle_is_moving,
                last_dir: input_select.kitchen_tulle_last_dir,
                protection: null,
              }
            - {
                cover: cover.kukhnia_zhaliuzi,
                position: 0,
                motion_flag: input_boolean.kitchen_blind_is_moving,
                last_dir: input_select.kitchen_blind_last_dir,
                protection: null,
              }

  kitchen_all_open_or_stop:
    alias: "всё - открыть или стоп: Кухня"
    sequence:
      - service: script.curtain_group_open_or_stop
        data:
          covers:
            [cover.kukhnia_shtora, cover.kukhnia_tiul, cover.kukhnia_zhaliuzi]
          motion_flags:
            [
              input_boolean.kitchen_curtain_is_moving,
              input_boolean.kitchen_tulle_is_moving,
              input_boolean.kitchen_blind_is_moving,
            ]
          last_dirs:
            [
              input_select.kitchen_curtain_last_dir,
              input_select.kitchen_tulle_last_dir,
              input_select.kitchen_blind_last_dir,
            ]
          protection_sensors: [null, null, null]

