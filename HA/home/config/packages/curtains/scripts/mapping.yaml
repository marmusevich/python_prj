            - { cover: "cover.master_sanuzel_shtora", position: 100, motion_flag: "input_boolean.master_bath_curtain_is_moving", last_dir: "input_select.master_bath_curtain_last_dir", protection: null }
            - { cover: "cover.master_sanuzel_tiul", position: 0, motion_flag: "input_boolean.master_bath_tulle_is_moving", last_dir: "input_select.master_bath_tulle_last_dir", protection: null }
            - { cover: "cover.master_sanuzel_zhaliuzi", position: 0, motion_flag: "input_boolean.master_bath_blind_is_moving", last_dir: "input_select.master_bath_blind_last_dir", protection: null }

  master_bath_scene_2:
    alias: "Мастер санузел сцена 2"
    sequence:
      - service: script.curtain_set_positions
        data:
          curtains:
            - { cover: "cover.master_sanuzel_shtora", position: 100, motion_flag: "input_boolean.master_bath_curtain_is_moving", last_dir: "input_select.master_bath_curtain_last_dir", protection: null }
            - { cover: "cover.master_sanuzel_tiul", position: 0, motion_flag: "input_boolean.master_bath_tulle_is_moving", last_dir: "input_select.master_bath_tulle_last_dir", protection: null }
            - { cover: "cover.master_sanuzel_zhaliuzi", position: 100, motion_flag: "input_boolean.master_bath_blind_is_moving", last_dir: "input_select.master_bath_blind_last_dir", protection: null }

  master_bath_scene_3:
