          motion_flags: [ input_boolean.master_bath_curtain_is_moving, input_boolean.master_bath_tulle_is_moving, input_boolean.master_bath_blind_is_moving ]
          last_dirs: [ input_select.master_bath_curtain_last_dir, input_select.master_bath_tulle_last_dir, input_select.master_bath_blind_last_dir ]

  # ============================================================================
  # СПАЛЬНЯ (с защитой от двери)
