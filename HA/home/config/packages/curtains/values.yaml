# храним промежуточные переменные / константы
# /config/packages/curtains/values.yaml

# 1. Константы (пороги)
input_number:
  curtain_closed_threshold:
    name: "Порог закрытия (%)"
    initial: 5
    min: 0
    max: 100
    step: 1
    mode: box
    
  curtain_open_threshold:
    name: "Порог открытия (%)"
    initial: 95
    min: 0
    max: 100
    step: 1
    mode: box

