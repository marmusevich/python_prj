          - type: state-icon
            style:
              left: 58%
              top: 59%
              ransform: translate(-50%, -50%)
            entity: climate.gostevoi_sanuzel_termostat
            icon: mdi:heating-coil
            tap_action:
              action: more-info
          - type: state-label
            style:
              left: 15%
