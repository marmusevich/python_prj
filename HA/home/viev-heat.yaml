views:
  - type: panel
    path: plan
    title: План
    cards:
      - type: picture-elements
        image: /local/plan/plan_.svg
        elements:
          - type: state-label
            style:
              left: 78%
              top: 50%
              ransform: translate(-50%, -50%)
              color: "#ffffff"
              font-size: 14px
              font-weight: bold
              text-shadow: 1px 1px 4px rgba(0,0,0,0.9)
            entity: sensor.kukhnia_teplyi_pol
            prefix: "Пол "
          - type: state-icon
            style:
              left: 78%
              top: 48%
              ransform: translate(-50%, -50%)
            entity: climate.kukhnia_termostat
            icon: mdi:heating-coil
            tap_action:
              action: more-info
          - type: state-label
            style:
              left: 58%
              top: 61%
              ransform: translate(-50%, -50%)
              color: "#ffffff"
              font-size: 14px
              font-weight: bold
              text-shadow: 1px 1px 4px rgba(0,0,0,0.9)
            entity: sensor.gostevoi_sanuzel_teplyi_pol
