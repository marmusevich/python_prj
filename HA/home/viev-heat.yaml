              left: 70%
              top: 28%
              ransform: translate(-50%, -50%)
            entity: climate.stolovaia_termostat
            icon: mdi:heating-coil
            tap_action:
              action: more-info
  - type: sections
    sections:
      - type: grid
        cards:
          - type: heading
            heading_style: title
            heading: Теплый пол
          - type: thermostat
            entity: climate.master_sanuzel_termostat
          - type: thermostat
            entity: climate.gostevoi_sanuzel_termostat
          - type: thermostat
            entity: climate.postirochnaia_termostat
          - type: thermostat
            entity: climate.stolovaia_termostat
          - type: thermostat
            entity: climate.kukhnia_termostat
        column_span: 4
    max_columns: 4
    title: Оборудование
    icon: mdi:cog
    cards: []
    show_icon_and_title: true
