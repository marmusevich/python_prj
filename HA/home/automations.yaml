####################################################
- id: 3000_electrical_room_fan_overheat_on
  alias: Щитовая - перегрев, включить вентиляцию
  trigger:
    - platform: state
      entity_id: binary_sensor.temperatura_it_shchita_slishkom_vysoka
      to: "on"
  action:
    - service: fan.turn_on
      target:
        entity_id: fan.rele_17_8
  mode: single

- id: 3000_electrical_room_fan_min_runtime
  alias: Щитовая - минимальное время работы вентилятора
  trigger:
    - platform: state
      entity_id: fan.rele_17_8
      from: "off"
      to: "on"
  condition:
    - condition: numeric_state
      entity_id: input_number.vremia_raboty_ventiliatsii_master_garderop_shchitovaia_min_0_ne_otkliuchat
      above: 0
  action:
    - delay:
        minutes: >
          {{ states('input_number.vremia_raboty_ventiliatsii_master_garderop_shchitovaia_min_0_ne_otkliuchat') | int }}
    - choose:
        # температура еще высокая
        - conditions:
            - condition: state
              entity_id: binary_sensor.temperatura_it_shchita_slishkom_vysoka
              state: "on"
          sequence: []
      default:
        - service: fan.turn_off
          target:
            entity_id: fan.rele_17_8
  mode: restart

- id: 3000_electrical_room_fan_temperature_normal
  alias: Щитовая - температура нормализовалась
  trigger:
    - platform: state
      entity_id: binary_sensor.temperatura_it_shchita_slishkom_vysoka
      to: "off"
  condition:
    - condition: numeric_state
      entity_id: input_number.vremia_raboty_ventiliatsii_master_garderop_shchitovaia_min_0_ne_otkliuchat
      below: 1
  action:
    - service: fan.turn_off
      target:
        entity_id: fan.rele_17_8
  mode: single
