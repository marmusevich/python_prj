# конфигурация модбас
####################################################################################################################################
# в сушнастях описываем устройства, в поле NAME на английском уникальный индификатор,
#   так как НА воспринимает это поля как ENTITY_ID
# имена и иконки назначить в секции ниже (homeassistant: customize: ) или через UI (интерфейс пользователя
#
# синтаксис смотри https://www.home-assistant.io/integrations/modbus/?spm=a2ty_o01.29997173.0.0.40e855fbHw7rl7#configuring-switch-entities
# настройка модбас устройств
modbus:
  - name: modbus_hub
    type: serial
    method: rtu
    port: "/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0"
    # взято от сюда, вывод команды :
    # ls -l /dev/serial/by-id/
    #total 0
    #lrwxrwxrwx    1 root     root            13 Jun  3 19:52 usb-1a86_USB_Serial-if00-port0 -> ../../ttyUSB1
    #lrwxrwxrwx    1 root     root            13 Jun 25  2025 usb-SONOFF_SONOFF_Dongle_Max_MG24_283ab00a00f1ef1185e6c50a6d9880ab-if00-port0 -> ../../ttyUSB0
    baudrate: 9600 # не менять
    bytesize: 8 # не менять
    parity: N # не менять
    stopbits: 2 # ← Важно! Не 1, а 2  не менять
    timeout: 3
    delay:
      5 # Задержка между запросами для стабильности


      ###########################
      # примеры для реле
      ###########################
      # переключать
      # lights:      или
      # fans:        или
      # switches:
      # - name: "CS8 Реле 7"
      #   slave: 7 # адрес реле
      #   address: 0 # номер порта  0 -- 1 и т.д
      #   unique_id: "_cs8_7_0_rele" # важно!!! без этого не добавляется в пространство, должно быть уникально
      #   write_type: coil # битовые данные -- вклю/выкл.
      #   verify: #  детали не обязательно и так работает
      #     input_type: coil
      #     #address: 2
      #     #state_on: 1
      #     #state_off: 0
      #
      #
      # здесь просто опрос состояния
      # binary_sensors:
      #   - name: "CS8 Relay 11_0 State"
      #     slave: 11
      #     address: 0
      #     unique_id: "_cs8_11_0_Relay"
      #     input_type: coil
      ###########################

    ####################################################################################################################################
    # вентиляторы вентеляции
    fans:
